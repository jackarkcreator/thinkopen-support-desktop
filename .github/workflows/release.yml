name: Release

# Build + publish installers on a version tag (e.g. `git tag v1.0.0 && git push --tags`).
# macOS → universal .dmg/.zip; Windows → NSIS .exe. Both are published to THIS repo's
# GitHub Releases (the public auto-update feed electron-updater reads).
#
# macOS is SIGNED (Developer ID Application: ThinkOpen LLC, 7C63B47XSL) + NOTARIZED
# via CSC_LINK / CSC_KEY_PASSWORD (Developer ID .p12) and APPLE_API_KEY_B64 /
# APPLE_API_KEY_ID / APPLE_API_ISSUER / APPLE_TEAM_ID (App Store Connect API key for
# notarytool). Windows is SIGNED via Azure Trusted Signing — electron-builder 25's
# native `win.azureSignOptions` (in package.json) signs each artifact DURING the build
# so latest.yml hashes match the signed .exe; auth = the Entra SP
# `gh-artifact-signing-thinkopen` via AZURE_TENANT_ID / AZURE_CLIENT_ID /
# AZURE_CLIENT_SECRET, cert profile thinkopen-public (CN "ThinkOpen, Inc.").
# The mac and win build steps are SPLIT BY OS so the Windows job never receives
# CSC_LINK (on Windows that env names a *Windows* cert and would break the build).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # electron-builder needs to create the Release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      # Serialize the platform jobs. `electron-builder --publish always` has each
      # job CREATE the GitHub release for the tag; running mac + win in parallel
      # races them, and the loser hits HTTP 422 "tag already_exists" and fails
      # WITHOUT publishing its assets (the Windows .exe + latest.yml update feed
      # silently missing). Sequential = job 1 creates the release, job 2 finds it
      # and uploads to it. (Race hit this repo on v1.0.8, 2026-06-06.)
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            args: --mac --universal
          - os: windows-latest
            args: --win --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # macOS: signed + notarized. notarytool occasionally fails with transient
      # network errors after a long hang; signing always succeeds before notarization
      # and a failed notarize publishes no asset, so a full retry of the step is safe.
      - name: Build & publish (mac — signed + notarized)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "${{ secrets.APPLE_API_KEY_B64 }}" | base64 --decode > "$RUNNER_TEMP/asc_key.p8"
          export APPLE_API_KEY="$RUNNER_TEMP/asc_key.p8"
          MAX_ATTEMPTS=3
          ATTEMPT=0
          until npx electron-builder ${{ matrix.args }} --publish always; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "Build & notarize failed after $MAX_ATTEMPTS attempts — giving up."
              exit 1
            fi
            echo "Attempt $ATTEMPT failed; retrying in 30s (attempt $((ATTEMPT + 1)) of $MAX_ATTEMPTS)..."
            sleep 30
          done

      # Windows: signed via Azure Trusted Signing (NO CSC_* env — that's macOS).
      # azureSignOptions in package.json + the AZURE_* service-principal creds drive
      # in-build signing; electron-builder installs the TrustedSigning PS module itself.
      - name: Build & publish (win — Azure Trusted Signing)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npx electron-builder ${{ matrix.args }} --publish always
