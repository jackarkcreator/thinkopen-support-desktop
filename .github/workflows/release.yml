name: Release

# Build + publish installers on a version tag (e.g. `git tag v1.0.0 && git push --tags`).
# macOS → universal .dmg/.zip; Windows → NSIS .exe. Both are published to THIS repo's
# GitHub Releases (the public auto-update feed electron-updater reads). Builds are
# currently UNSIGNED — add Apple notarization + Azure Trusted Signing secrets later.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # electron-builder needs to create the Release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      # Serialize the platform jobs. `electron-builder --publish always` has each
      # job CREATE the GitHub release for the tag; running mac + win in parallel
      # races them, and the loser hits HTTP 422 "tag already_exists" and fails
      # WITHOUT publishing its assets (the Windows .exe + latest.yml update feed
      # silently missing). Sequential = job 1 creates the release, job 2 finds it
      # and uploads to it. (Race hit this repo on v1.0.8, 2026-06-06.)
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            args: --mac --universal
          - os: windows-latest
            args: --win --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.args }} --publish always
