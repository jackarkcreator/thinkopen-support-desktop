name: Release

# Build + publish installers on a version tag (e.g. `git tag v1.0.0 && git push --tags`).
# macOS → universal .dmg/.zip; Windows → NSIS .exe. Both are published to THIS repo's
# GitHub Releases (the public auto-update feed electron-updater reads).
#
# Windows is SIGNED via Azure Trusted Signing — electron-builder 25's native
# `win.azureSignOptions` (in package.json) signs each artifact DURING the build, so
# latest.yml hashes match the signed .exe and auto-update stays intact. Auth = the
# Entra service principal `gh-artifact-signing-thinkopen` via AZURE_TENANT_ID /
# AZURE_CLIENT_ID / AZURE_CLIENT_SECRET (repo secrets), scoped to the shared `thinkopen`
# signing account, cert profile thinkopen-public (subject CN "ThinkOpen, Inc."). The
# AZURE_* env sits on the combined step but only the win target consumes it (mac ignores
# win config). macOS is still UNSIGNED — add Apple notarization secrets later.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # electron-builder needs to create the Release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      # Serialize the platform jobs. `electron-builder --publish always` has each
      # job CREATE the GitHub release for the tag; running mac + win in parallel
      # races them, and the loser hits HTTP 422 "tag already_exists" and fails
      # WITHOUT publishing its assets (the Windows .exe + latest.yml update feed
      # silently missing). Sequential = job 1 creates the release, job 2 finds it
      # and uploads to it. (Race hit this repo on v1.0.8, 2026-06-06.)
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            args: --mac --universal
          - os: windows-latest
            args: --win --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Azure Trusted Signing (win target only; mac leg ignores these).
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npx electron-builder ${{ matrix.args }} --publish always
